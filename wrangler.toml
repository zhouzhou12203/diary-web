name = "diary-web"

# Cloudflare Pages configuration
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "diary-db"
database_id = "d06caa21-556e-477f-bf86-959dd894e047"

[vars]
ENVIRONMENT = "production"
APP_TIMEZONE = "Asia/Shanghai"
IMAGES_VARIANT = "public"
# Optional:
# IMAGES_ACCOUNT_ID = "your-cloudflare-account-id"
# IMAGES_DELIVERY_URL = "https://imagedelivery.net/your_hash"

# Production secrets should be configured with:
# wrangler secret put SESSION_SECRET
# wrangler secret put ADMIN_BOOTSTRAP_PASSWORD
# wrangler secret put APP_BOOTSTRAP_PASSWORD
# wrangler secret put STATS_API_KEY
# wrangler secret put IMAGES_API_TOKEN
