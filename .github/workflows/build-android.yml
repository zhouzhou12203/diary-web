name: Build And Release Android APK

on:
  push:
    tags:
      - 'apk-*'
      - 'android-*'
      - 'master-local-apk-*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Sync Android project
        run: npm run android:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare APK asset
        id: apk
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_KEY="${GITHUB_REF_NAME}"
          else
            RELEASE_KEY="${GITHUB_SHA::7}"
          fi

          APK_NAME="diary-web-${RELEASE_KEY}-debug.apk"
          APK_SOURCE="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_TARGET="${RUNNER_TEMP}/${APK_NAME}"

          cp "${APK_SOURCE}" "${APK_TARGET}"

          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"
          echo "apk_target=${APK_TARGET}" >> "${GITHUB_OUTPUT}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_target }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${{ steps.apk.outputs.apk_target }}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${{ steps.apk.outputs.apk_target }}" \
              --title "Android APK ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
